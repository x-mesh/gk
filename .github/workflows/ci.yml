name: ci
on:
  push:
    branches: [main, develop]
  pull_request:
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        # Matrix must satisfy the `go 1.25.0` directive in go.mod.
        go: ['1.25']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./... -race -cover
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      # action@v8 resolves the latest golangci-lint v2 release (Go 1.25-capable).
      - uses: golangci/golangci-lint-action@v8
        with:
          version: latest
