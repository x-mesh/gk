# Repo-local gk config for git-kit itself. Merges over the global
# ~/.config/gk/config.yaml — only the keys below are overridden.

# Pre-tag gate. Listing steps replaces the built-in set, so the three
# defaults are repeated here.
#
# lint and test were added after golangci-lint sat red from v0.128.0
# through v0.130.0 — three releases — without ship noticing. Nothing in
# the pipeline looked: the built-in `commit-lint` checks the commit
# *message*, and ship's watch follows the tag-triggered release workflow,
# which stayed green while the branch `ci` workflow failed. A preflight
# failure costs nothing (no tag exists yet); a red CI discovered after the
# tag is public can only be remediated, never un-shipped.
#
# Cost on this repo: lint ~1s warm, test ~95s (internal/cli is ~85s of
# it). Against a pipeline that already blocks minutes on the CI watch,
# moving the same failures before the tag is worth the wall time.
preflight:
  steps:
    - name: commit-lint
      command: commit-lint
    - name: branch-check
      command: branch-check
    - name: no-conflict
      command: no-conflict
    # Ordered cheapest-first so an obvious break fails in a second
    # rather than after the full test run.
    - name: lint
      command: golangci-lint run
    - name: test
      command: go test ./...

ship:
  # Run the post-tag pipeline. false returns right after the push and the
  # release goes out untracked; ship then prints the skipped commands.
  wait: true

  # Blocking CI watch. The tag is already public once this runs, so a
  # failure here means "rerun the watcher", never "re-ship the version".
  #
  # gk runs each command with `sh -c` and injects no version variable, so
  # the tag is derived here. The release workflow is triggered by the tag
  # push, and `gh run list --branch <tag>` is what selects that run rather
  # than the branch runs the same push also starts.
  #
  # The retry loop exists because the run is not queryable the instant the
  # tag lands — polling for up to 60s covers registration lag without
  # hanging forever on a workflow that never started.
  watch:
    - name: release-workflow
      command: |
        TAG="$(git describe --tags --abbrev=0)"
        ID=""
        for _ in $(seq 1 30); do
          ID="$(gh run list --branch "$TAG" --limit 1 --json databaseId -q '.[0].databaseId // empty' 2>/dev/null)"
          [ -n "$ID" ] && break
          sleep 2
        done
        if [ -z "$ID" ]; then
          echo "no workflow run found for $TAG after 60s" >&2
          exit 1
        fi
        gh run watch "$ID" --exit-status

  # Post-release checks. A green workflow does not by itself prove the
  # artifacts are reachable or that the tap moved, which is the whole
  # point of `brew upgrade` working right after a release.
  verify:
    - name: release-assets
      command: |
        TAG="$(git describe --tags --abbrev=0)"
        gh release view "$TAG" -R x-mesh/gk --json isDraft,assets \
          -q 'select(.isDraft==false) | .assets | length' | grep -qE '^[1-9]'

    # The cask is read through the contents API, not raw.githubusercontent.com:
    # the raw CDN serves a cached copy for minutes after a push, which is
    # exactly the window this check runs in. In the v0.130.0 release it
    # reported the previous version long after the tap had already moved.
    #
    # No `gh` needed — plain curl against a public repo. A token is used when
    # one is around (higher rate limit); `-H "Authorization:"` with an empty
    # value is curl's way of *removing* the header, so the unauthenticated
    # path sends no broken "Bearer " either.
    - name: tap-cask
      command: |
        V="$(git describe --tags --abbrev=0)"; V="${V#v}"
        T="${GH_TOKEN:-$GITHUB_TOKEN}"
        if [ -n "$T" ]; then AUTH="Authorization: Bearer $T"; else AUTH="Authorization:"; fi
        curl -fsSL -H 'Accept: application/vnd.github.raw' -H "$AUTH" \
          https://api.github.com/repos/x-mesh/homebrew-tap/contents/Casks/gk.rb \
          | grep -q "version \"$V\""

    # Cross-checks the tap's checksum against the published artifact, so a
    # stale or half-written cask fails here instead of at `brew install`.
    # Same contents-API read as tap-cask, for the same cache reason — against
    # the raw CDN this compared a fresh release to a stale cask and failed.
    - name: cdn-checksums
      command: |
        TAG="$(git describe --tags --abbrev=0)"
        T="${GH_TOKEN:-$GITHUB_TOKEN}"
        if [ -n "$T" ]; then AUTH="Authorization: Bearer $T"; else AUTH="Authorization:"; fi
        REL="$(curl -fsSL "https://github.com/x-mesh/gk/releases/download/$TAG/checksums.txt" \
          | awk '/gk_darwin_arm64\.tar\.gz/{print $1}')"
        CASK="$(curl -fsSL -H 'Accept: application/vnd.github.raw' -H "$AUTH" \
          https://api.github.com/repos/x-mesh/homebrew-tap/contents/Casks/gk.rb \
          | awk '/sha256 "/{s=$2} /gk_darwin_arm64\.tar\.gz/{gsub(/"/,"",s); print s; exit}')"
        if [ -z "$REL" ] || [ -z "$CASK" ]; then
          echo "could not read checksums (release=$REL cask=$CASK)" >&2
          exit 1
        fi
        [ "$REL" = "$CASK" ]
