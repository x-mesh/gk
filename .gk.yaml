# gk repo-local config — overrides ~/.config/gk/config.yaml
# See docs/config.md for all fields.

status:
  # Dogfood the shipped defaults: `local` (working-tree change badge) and
  # `since-push` (unpushed age+count, --remotes fallback) so `gk status` in
  # this repo surfaces every local-change layer at a glance.
  vis: [gauge, bar, progress, base, tree, staleness, local, since-push]

ai:
  commit:
    deny_paths:
      # ── default deny list (secrets / credentials) ──
      - ".env"
      - ".env.*"
      - "*.pem"
      - "id_rsa*"
      - "credentials.json"
      - "*.pfx"
      - "*.kdbx"
      - "*.keystore"
      - "service-account*.json"
      - "terraform.tfstate"
      - "terraform.tfstate.*"
