# gk repo-local config — overrides ~/.config/gk/config.yaml
# See docs/config.md for all fields.

status:
  # Dogfood the shipped defaults: `local` (working-tree change badge) and
  # `since-push` (unpushed age+count, --remotes fallback) so `gk status` in
  # this repo surfaces every local-change layer at a glance.
  vis: [gauge, bar, progress, base, tree, staleness, local, since-push]

ai:
  commit:
    deny_paths:
      # ── default deny list (secrets / credentials) ──
      - ".env"
      - ".env.*"
      - "*.pem"
      - "id_rsa*"
      - "credentials.json"
      - "*.pfx"
      - "*.kdbx"
      - "*.keystore"
      - "service-account*.json"
      - "terraform.tfstate"
      - "terraform.tfstate.*"

# ── Release pipeline (gk ship) ──────────────────────────────────────────
# preflight runs before the release commit; ship.watch tracks the tag-
# triggered GitHub Actions run; ship.verify checks the published artifacts.
# The /release skill drives this via `gk ship --dry-run --json` + `gk ship -y`.
preflight:
  steps:
    - name: gofmt
      command: gofmt          # builtin: fail fast on formatting before the slower lint
    - name: lint
      command: golangci-lint run
    - name: test
      command: go test ./... -race
    - name: goreleaser-check
      command: goreleaser check
      continue_on_failure: true

ship:
  watch:
    - name: release-workflow
      command: sleep 5 && gh run watch $(gh run list -R x-mesh/gk --workflow release --limit 1 --json databaseId --jq '.[0].databaseId') -R x-mesh/gk --exit-status
  verify:
    - name: tag-on-remote
      command: git ls-remote --tags origin "$(git describe --tags --abbrev=0)" | grep -q .
    - name: tap-cask
      command: T=$(mktemp -d) && git clone -q --depth 1 git@github.com:x-mesh/homebrew-tap.git "$T" && grep -q "version \"$(git describe --tags --abbrev=0 | sed 's/^v//')\"" "$T/Casks/gk.rb"; R=$?; rm -rf "$T"; exit $R
    - name: cdn-checksums
      command: curl -fsIL "https://github.com/x-mesh/gk/releases/download/$(git describe --tags --abbrev=0)/checksums.txt" >/dev/null
