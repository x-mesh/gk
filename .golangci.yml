version: "2"
run:
  timeout: 5m
linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - unconvert
  settings:
    revive:
      rules:
        - name: exported
          arguments: ["checkPublicInterface"]
formatters:
  enable:
    - gofmt
    - goimports
