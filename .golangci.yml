run:
  timeout: 5m
linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - unconvert
linters-settings:
  revive:
    rules:
      - name: exported
        arguments: ["checkPublicInterface"]
