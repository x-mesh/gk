version: "2"
run:
  timeout: 5m
linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - unconvert
  settings:
    errcheck:
      # Writes to stdout/stderr and defer-close idioms rarely produce
      # actionable errors in CLI code; excluding keeps the signal strong.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (io.Closer).Close
        - (*os.File).Close
        - os.Remove
    revive:
      # Use revive's minimal default rules. The strict `exported` rule
      # (require a doc comment on every exported identifier) is valuable
      # but currently out of scope — turning it on would require a
      # project-wide doc sweep across ~30 call sites.
      rules: []
  exclusions:
    rules:
      # Test helpers often call side-effecting APIs and assert via the
      # surrounding test, not the returned error.
      - path: _test\.go
        linters:
          - errcheck
formatters:
  enable:
    - gofmt
    - goimports
