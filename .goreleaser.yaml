version: 2
project_name: gk
before:
  hooks:
    - go mod tidy
builds:
  - id: gk
    main: ./cmd/gk
    binary: gk
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux]
    goarch: [amd64, arm64]
    flags:
      # -buildvcs=false stops the Go toolchain from embedding
      # debug.BuildInfo VCS settings (vcs.revision/vcs.time/vcs.modified)
      # into the binary. We already inject those via ldflags below, and a
      # transient working-tree change from the `go mod tidy` before-hook
      # would otherwise mark the released artifact as -dirty.
      - -buildvcs=false
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
archives:
  - formats: [tar.gz]
    # Version is intentionally omitted so that
    # https://github.com/x-mesh/gk/releases/latest/download/gk_<os>_<arch>.tar.gz
    # works as a stable URL. GoReleaser's brews block re-derives URL+sha256
    # from this template automatically, so the Homebrew tap stays in sync.
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
checksum:
  name_template: "checksums.txt"
  algorithm: sha256
snapshot:
  version_template: "{{ .Tag }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
brews:
  - name: gk
    repository:
      owner: x-mesh
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/x-mesh/gk
    description: "Lightweight Go git helper CLI (pull, log, status, branch)"
    license: MIT
    commit_author:
      name: gk-bot
      email: bot@gk.dev
    test: |
      system "#{bin}/gk --version"
    install: |
      bin.install "gk"
    caveats: |
      gk uses git under the hood. Ensure git >= 2.30 is installed.
