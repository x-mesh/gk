version: 2
project_name: gk
before:
  hooks:
    - go mod tidy
builds:
  - id: gk
    main: ./cmd/gk
    binary: gk
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux]
    goarch: [amd64, arm64]
    flags:
      # -buildvcs=false stops the Go toolchain from embedding
      # debug.BuildInfo VCS settings (vcs.revision/vcs.time/vcs.modified)
      # into the binary. We already inject those via ldflags below, and a
      # transient working-tree change from the `go mod tidy` before-hook
      # would otherwise mark the released artifact as -dirty.
      - -buildvcs=false
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
archives:
  - formats: [tar.gz]
    # Version is intentionally omitted so that
    # https://github.com/x-mesh/gk/releases/latest/download/gk_<os>_<arch>.tar.gz
    # works as a stable URL. GoReleaser's brews block re-derives URL+sha256
    # from this template automatically, so the Homebrew tap stays in sync.
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
checksum:
  name_template: "checksums.txt"
  algorithm: sha256
snapshot:
  version_template: "{{ .Tag }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
# goreleaser v2.16 removed `brews:` (deprecated since v2.10). The Homebrew
# tap is now published as a cask via `homebrew_casks:`. Casks don't support
# the `test:` / `install:` blocks the old formula had — binaries are wired
# up by listing them under `binaries:` and Homebrew installs them directly.
# `bin.install "gk"` + `system "#{bin}/gk --version"` are no longer
# applicable shapes here.
homebrew_casks:
  - name: gk
    binaries:
      - gk
    # Expose the same binary as `git-kit` as well. The `gk` name is shadowed
    # by a shell alias on common setups (oh-my-zsh's git plugin sets
    # `gk=gitk`), and a `git-kit` on PATH also lets `git kit …` resolve as a
    # native git subcommand. goreleaser's `binaries:` list can't set a
    # per-entry symlink target, so the second link is declared as raw cask
    # DSL — `binary "gk", target: "git-kit"` links the staged `gk` under a
    # second name in /opt/homebrew/bin. The quarantine xattr is stripped from
    # the underlying file by the post-install hook below, so both names work.
    custom_block: |
      binary "gk", target: "git-kit"
    repository:
      owner: x-mesh
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/x-mesh/gk
    description: "Lightweight Go git helper CLI (pull, log, status, branch)"
    commit_author:
      name: gk-bot
      email: bot@gk.dev
    # Strip the com.apple.quarantine xattr that Homebrew applies to every
    # cask download. Without this, macOS Gatekeeper silently moves the
    # unsigned `gk` binary to the Trash on first launch — the published
    # release isn't codesigned/notarized and we don't intend to pay for
    # the Apple Developer Program just to ship a CLI. The staged copy
    # under #{staged_path} is what the `binary "gk"` symlink in
    # /opt/homebrew/bin ultimately resolves to, so cleaning the attribute
    # there is enough.
    hooks:
      post:
        install: |
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/gk"]
    caveats: |
      gk uses git under the hood. Ensure git >= 2.30 is installed.
