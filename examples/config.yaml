# ~/.config/gk/config.yaml (or ./.gk.yaml in a repo)
#
# gk configuration — see docs/config.md for full reference.
# All fields are optional. Omit to use defaults.

# Default base branch for `gk pull`. If empty, auto-detect:
#   origin/HEAD → develop → main → master
base_branch: ""

# Remote name used for fetch/rebase operations.
remote: origin

log:
  # git --pretty=format string. See docs/commands.md#gk-log.
  # Default shows: short hash, relative age, author, subject, refs.
  format: '%C(yellow)%h%C(reset) %C(green)(%ar)%C(reset) %C(bold blue)<%an>%C(reset) %s%C(auto)%d%C(reset)'

  # Include topology graph by default.
  graph: false

  # Max commits (overridden by --limit / -n flag).
  limit: 20

  # Default visualization layers for `gk log`. Values: pulse, calendar,
  # tags-rule, impact, cc, safety, hotspots, trailers, lanes. Individual
  # --cc / --impact / ... flags or --vis <list> override this for a single
  # invocation; --vis none disables every layer; explicit --format also
  # suppresses the default so the raw pretty-format wins.
  vis: [cc, safety, tags-rule]

status:
  # Default visualization layers for `gk status`. Values: gauge, bar, progress,
  # types, staleness, tree, conflict, churn, risk, base. Override per-invocation
  # with `--vis ...` or disable all layers with `--vis none`.
  #
  # `base` adds a second "from <trunk> [gauge]" line on feature branches,
  # summarizing how far the current branch has diverged from the repo's
  # canonical trunk (resolved via `base_branch` below, then refs/remotes/
  # origin/HEAD, then main/master/develop). Off by default because it adds
  # ~15ms per invocation (one `git rev-list --left-right --count` call).
  vis: [gauge, bar, progress, tree, staleness]

  # Opt-in upstream fetch. Default false: `gk status` does no network activity
  # unless the caller passes `-f` / `--fetch`. Set to true to always fetch
  # (equivalent to passing the flag on every invocation). The fetch itself is
  # bounded (3s timeout, no prompts, no submodule recursion, silent on
  # failure) — status always renders even offline.
  auto_fetch: false

  # How per-entry state is displayed in the tree and section renderers.
  #   labels (default) → word label ("new", "mod", "staged", "conflict", ...)
  #   glyphs           → single-cell marker (+ ~ ● ⚔ #) — dense, less granular
  #   raw              → literal git porcelain code (??, .M, UU) — git-literate
  # Overridable per call via `--xy-style`.
  xy_style: labels

ui:
  # Color mode: "auto", "always", "never". NO_COLOR env is always respected.
  color: auto

  # Default conflict resolution preference: "", "ours", "theirs".
  # Empty means always prompt interactively when TTY is available.
  prefer: ""

branch:
  # Threshold in days for `gk branch list --stale`.
  stale_days: 30

  # Branches never deleted by `gk branch clean`.
  protected:
    - main
    - master
    - develop

clone:
  # Protocol used when `gk clone owner/repo` expands the shorthand.
  # Values: "ssh" (default) or "https". Passing `--ssh` / `--https` to
  # a single invocation overrides this without changing config.
  default_protocol: ssh

  # Host inserted into the expanded URL when the shorthand omits it.
  default_host: github.com

  # Optional Go-style layout. When set, `gk clone owner/repo` with no
  # explicit target lands at `<root>/<host>/<owner>/<repo>` instead of
  # the current directory. Leave empty for git's default `./repo`.
  # root: ~/work

  # Alias table for multi-host users. `gk clone gl:group/svc` expands
  # to the host + protocol listed here. Omit `protocol:` to fall back
  # to default_protocol. Unknown aliases are passed to git verbatim.
  # hosts:
  #   gl:   { host: gitlab.com, protocol: ssh }
  #   work: { host: git.company.internal, protocol: https }

  # Run these gk subcommands inside the fresh checkout after clone
  # succeeds. Supported: "hooks-install", "doctor". Failures warn but
  # never fail the clone itself. Default empty — opt-in only.
  # post_actions: [hooks-install, doctor]

worktree:
  # Managed base for relative worktree names. `gk worktree add <name>` drops
  # the checkout at <base>/<project>/<name>. Leading `~/` is expanded against
  # $HOME. Absolute paths passed to `gk worktree add` always win and bypass
  # this layout.
  base: ~/.gk/worktree

  # Per-project segment under `base`. Empty means "auto-derive from the git
  # toplevel basename", so /Users/me/work/gk → `gk`. Override when two
  # clones share the same basename (e.g. work vs personal).
  # project: work-gk
