# ~/.config/gk/config.yaml (or ./.gk.yaml in a repo)
#
# gk configuration — see docs/config.md for full reference.
# All fields are optional. Omit to use defaults.

# Default base branch for `gk pull`. If empty, auto-detect:
#   origin/HEAD → develop → main → master
base_branch: ""

# Remote name used for fetch/rebase operations.
remote: origin

log:
  # git --pretty=format string. See docs/commands.md#gk-log.
  # Default shows: short hash, relative age, author, subject, refs.
  format: '%C(yellow)%h%C(reset) %C(green)(%ar)%C(reset) %C(bold blue)<%an>%C(reset) %s%C(auto)%d%C(reset)'

  # Include topology graph by default.
  graph: false

  # Max commits (overridden by --limit / -n flag).
  limit: 20

  # Default visualization layers for `gk log`. Values: pulse, calendar,
  # tags-rule, impact, cc, safety, hotspots, trailers, lanes. Individual
  # --cc / --impact / ... flags or --vis <list> override this for a single
  # invocation; --vis none disables every layer; explicit --format also
  # suppresses the default so the raw pretty-format wins.
  vis: [cc, safety, tags-rule]

status:
  # Default visualization layers for `gk status`. Values: gauge, bar, progress,
  # types, staleness, tree, conflict, churn, risk, base, local, since-push.
  # Override per-invocation with `--vis ...` or disable all with `--vis none`.
  #
  # `local` adds a working-tree change badge to the BRANCH line
  # (`· 5 unstaged · 1 staged · 2 conflicts`); `since-push` adds the unpushed
  # commit age+count (`· unpushed 2h (3c)`), falling back to any remote-tracking
  # ref when the branch has no upstream. Together with `↑A ↓B` they show every
  # local-change layer at a glance; both stay silent when there is nothing to show.
  #
  # `base` adds a second "from <trunk> [gauge]" line on feature branches,
  # summarizing how far the current branch has diverged from the repo's
  # canonical trunk (resolved via `base_branch` below, then refs/remotes/
  # origin/HEAD, then main/master/develop). On by default — surfaces the
  # signal users typically read to decide whether to merge or sync. Cost
  # is one local `git rev-list --left-right --count` (~10–15ms). Suppressed
  # automatically on detached HEAD and when the branch IS the base. The
  # line also carries a short action hint (`→ ready to merge into main`,
  # `→ behind main: gk sync`, etc.) when the gauge alone isn't decisive.
  vis: [gauge, bar, progress, base, tree, staleness, local, since-push]

  # Opt-in upstream fetch. Default false: `gk status` does no network activity
  # unless the caller passes `-f` / `--fetch`. Set to true to always fetch
  # (equivalent to passing the flag on every invocation). The fetch itself is
  # bounded (3s timeout, no prompts, no submodule recursion, silent on
  # failure) — status always renders even offline.
  auto_fetch: false

  # How per-entry state is displayed in the tree and section renderers.
  #   labels (default) → word label ("new", "mod", "staged", "conflict", ...)
  #   glyphs           → single-cell marker (+ ~ ● ⚔ #) — dense, less granular
  #   raw              → literal git porcelain code (??, .M, UU) — git-literate
  # Overridable per call via `--xy-style`.
  xy_style: labels

ui:
  # Color mode: "auto", "always", "never". NO_COLOR env is always respected.
  color: auto

  # Default conflict resolution preference: "", "ours", "theirs".
  # Empty means always prompt interactively when TTY is available.
  prefer: ""

sync:
  # Integration strategy when the current branch has diverged from its base.
  # Values: "rebase" (default), "merge", "ff-only" (refuse divergence).
  # Override per-invocation with `--strategy <mode>`.
  strategy: rebase

refresh:
  # Long-lived branches that `gk refresh` (alias: `gk re`) fast-forwards to
  # their remote counterparts (origin/<branch>). refresh NEVER rebases or
  # merges across branches — each branch only moves to its own remote, and
  # only as a fast-forward, so it is safe on shared branches: a diverged
  # branch is skipped with a hint, never rewritten.
  #
  # Leave empty to resolve the list dynamically per repo: the canonical main
  # branch (origin/HEAD → main → master) plus develop/dev when they exist.
  # Set an explicit list to override (add a release branch, or track master
  # only). Positional args win over both: `gk refresh main release/1.x`.
  # tracked:
  #   - main
  #   - develop

branch:
  # Threshold in days for `gk branch list --stale`.
  stale_days: 30

  # Branches never deleted by `gk branch clean`.
  protected:
    - main
    - master
    - develop

clone:
  # Protocol used when `gk clone owner/repo` expands the shorthand.
  # Values: "ssh" (default) or "https". Passing `--ssh` / `--https` to
  # a single invocation overrides this without changing config.
  default_protocol: ssh

  # Host inserted into the expanded URL when the shorthand omits it.
  default_host: github.com

  # Optional Go-style layout. When set, `gk clone owner/repo` with no
  # explicit target lands at `<root>/<host>/<owner>/<repo>` instead of
  # the current directory. Leave empty for git's default `./repo`.
  # root: ~/work

  # Alias table for multi-host users. `gk clone gl:group/svc` expands
  # to the host + protocol listed here. Omit `protocol:` to fall back
  # to default_protocol. Unknown aliases are passed to git verbatim.
  # hosts:
  #   gl:   { host: gitlab.com, protocol: ssh }
  #   work: { host: git.company.internal, protocol: https }

  # Run these gk subcommands inside the fresh checkout after clone
  # succeeds. Supported: "hooks-install", "doctor". Failures warn but
  # never fail the clone itself. Default empty — opt-in only.
  # post_actions: [hooks-install, doctor]

worktree:
  # Managed base for relative worktree names. `gk worktree add <name>` drops
  # the checkout at <base>/<project>/<name>. Leading `~/` is expanded against
  # $HOME. Absolute paths passed to `gk worktree add` always win and bypass
  # this layout.
  base: ~/.gk/worktree

  # Per-project segment under `base`. Empty means "auto-derive from the git
  # toplevel basename", so /Users/me/work/gk → `gk`. Override when two
  # clones share the same basename (e.g. work vs personal).
  # project: work-gk

# ai drives `gk ai commit` and future `gk ai *` subcommands. Provider
# binaries are subprocess-called; gk never talks to LLM APIs directly.
ai:
  # Master off-switch. Setting false (or exporting GK_AI_DISABLE=1)
  # disables every `gk ai *` subcommand with a clear error.
  enabled: true

  # Default provider. Empty = auto-detect in order:
  #   anthropic → openai → nvidia → groq → gemini → qwen → kiro-cli.
  # Override per-invocation with `--provider anthropic|openai|nvidia|groq|gemini|qwen|kiro`.
  #
  # Install hints:
  #   nvidia   — no binary needed; set NVIDIA_API_KEY env var
  #   gemini   — npm i -g @google/gemini-cli  (auth: GEMINI_API_KEY or OAuth)
  #   qwen     — npm i -g @qwen-code/qwen-code (auth: qwen auth qwen-oauth)
  #   kiro-cli — https://kiro.dev/docs/cli/installation (note: NOT the `kiro`
  #              IDE launcher; the headless binary is `kiro-cli`)
  # provider: nvidia

  # NVIDIA provider settings. Uses the OpenAI-compatible Chat Completions API
  # directly over HTTP — no external binary required. Auth: NVIDIA_API_KEY env var.
  # `timeout` (Go duration) is the per-HTTP-call timeout for this provider.
  #
  # `model` / `endpoint` override the built-in defaults; `api_key`, when set,
  # takes precedence over the env var. anthropic/openai/groq accept the same
  # four keys under their own block. Prefer the env var for shared or committed
  # configs — a key written here lives in a plaintext yaml that is easy to leak.
  nvidia:
    timeout: "60s"
    # api_key: "nvapi-..."   # overrides NVIDIA_API_KEY when set

  # OpenAI (or any OpenAI-compatible endpoint, e.g. a self-hosted proxy).
  # Auth: OPENAI_API_KEY env var, or api_key below.
  # openai:
  #   endpoint: "https://api.openai.com/v1/chat/completions"
  #   model: "gpt-4o-mini"
  #   api_key: "sk-..."      # overrides OPENAI_API_KEY when set

  # Custom, user-named providers. Point `provider:` at any name not in the
  # built-in set (anthropic/openai/nvidia/groq/gemini/qwen/kiro) and gk builds
  # it from the entry's `format` (wire protocol: openai | anthropic | nvidia |
  # groq; defaults to openai). The remaining keys override the adapter defaults
  # exactly like the dedicated blocks above. Built-in names need no entry here.
  # providers:
  #   my-gateway:
  #     format: openai
  #     endpoint: "https://your-gateway.example.com/v1/chat/completions"
  #     model: "your-model"
  #     # api_key: "..."

  # Chat-style commands (gk do / ask / explain, and the response cap shared by
  # pr / review / changelog).
  chat:
    # Per-call timeout (Go duration). The call falls back / errors out instead
    # of hanging when the provider is slow.
    timeout: "30s"
    # Advisory response token cap forwarded to the provider (0 = provider
    # default). Applies to do/ask/explain and pr/review/changelog.
    max_tokens: 4096

  # Language for git *artifacts* — commit messages, pr, changelog (BCP-47
  # short code). Conversational commands (do / ask / explain, status --ai)
  # do NOT follow this; they render user-facing prose and follow output.lang
  # instead, so you can keep English commits while the CLI talks to you in
  # Korean (lang: en + output.lang: ko). Left unset it follows output.lang.
  # An explicit non-English value here is still honoured everywhere for users
  # who want one language throughout. One-shot override: `--lang`.
  # lang: en

  # AI assistance that is attached to existing commands.
  #   off     -> never attach AI unless a CLI flag asks for it
  #   suggest -> show a lightweight hint pointing to `gk next`
  #   auto    -> automatically run AI help on enabled surfaces
  assist:
    mode: off
    status: true

    # Add the working-tree diff to the `gk status --ai` prompt so the
    # assistant can reason about WHAT changed, not just file counts. Off by
    # default: it costs tokens and sends patch content to remote providers
    # (still routed through the privacy gate / deny_paths first).
    include_diff: false

    # Max diff size in bytes when include_diff is on (truncated head-first).
    diff_budget: 8000

    # Advisory cap on the AI response length.
    max_tokens: 1200

    # Hard timeout (seconds) for a single status AI call. On timeout gk
    # falls back to the deterministic local guidance — status never hangs.
    timeout_secs: 8

    # Cache the AI answer keyed by repo state (HEAD + working tree + diff +
    # lang + provider). Unchanged tree → reuse, so repeated runs and
    # `mode: auto` don't re-bill the provider. Cache lives in .git/gk-ai-cache.
    cache: true

  commit:
    # Execution mode when no flag is passed.
    #   interactive → TUI review (default)
    #   force       → skip review, commit immediately
    #   dry-run     → print plan only
    mode: interactive

    # Soft cap on how many commit groups the classifier may produce.
    max_groups: 10

    # Model override for `gk commit` only. Commit-message generation is a
    # mechanical task a small/fast model handles well — pin a cheaper model
    # here while the chat/advice commands (do/ask/explain/status) keep the
    # larger ai.<provider>.model. Empty = use the provider's default model.
    # HTTP providers only; CLI providers (gemini/qwen/kiro) ignore it.
    # One-shot override: `gk commit --model <id>`.
    # model: "kiro/claude-haiku-4.5"

    # Hard cap on provider input tokens. Large diffs are truncated
    # (stat → hunk head → cluster summary) to stay under this limit.
    max_tokens: 24000

    # Per-provider timeout (Go duration). Stuck subprocess is cancelled.
    timeout: 30s

    # When false, providers whose Locality() is "remote" are blocked for
    # EVERY AI command (commit, pr, review, changelog, ask, explain, do,
    # status --ai, merge --ai), not just commit — it is the repo-wide
    # "no external LLM" switch. The shipped HTTP/CLI providers are remote,
    # so flip this to false only if you run a local provider.
    allow_remote: true

    # When true, each generated commit carries a trailer:
    #   AI-Assisted-By: <provider>@<version>
    # Useful for audits / PR review; off by default because team
    # conventions on AI-attribution vary.
    trailer: false

    # When true, append one JSONL line per commit to
    # .git/gk-ai-commit/audit.jsonl (RunID, provider, tokens, subject).
    audit: false

    # WIP-like commits at HEAD are folded into the AI plan and unwrapped
    # via `git reset HEAD~N` after Apply. Built-in defaults already cover:
    # `--wip--` (git stash), `wip:`, `WIP`, `tmp`, `temp`, `save`,
    # `checkpoint`, `fixup!`, `squash!`. Patterns below ADD to the
    # defaults — they don't replace. Use --no-wip-unwrap on the CLI to
    # disable for one invocation.
    # Safety: chain stops at protected branches (branch.protected),
    # already-pushed commits (reachable from upstream), and merge commits.
    # wip_patterns:
    #   - "^DRAFT\\b"
    #   - "^scratch\\b"

    # Cap on chain length. 0 falls back to 10 — stops runaway scans on
    # branches where every commit is a save-point.
    wip_max_chain: 10

    # Paths matching any of these globs (filepath.Match syntax, applied
    # to both basename and full path) are dropped from the WIP set
    # before anything leaves the process. Keeps secret-bearing files
    # out of provider prompts even with `--force`.
    #
    # Stays in sync with config.DefaultDenyPaths() — when adding entries,
    # update both. Categories: secrets, auth/config files, infra state,
    # PII-prone data, compiled artifacts.
    deny_paths:
      # secrets / credentials
      - .env
      - .env.*
      - "*.pem"
      - "*.key"
      - "*.crt"
      - "*.cer"
      - "*.p12"
      - "*.pfx"
      - "*.jks"
      - "*.keystore"
      - "*.kdbx"
      - id_rsa*
      - id_dsa*
      - id_ecdsa*
      - id_ed25519*
      - "*.ppk"
      - credentials.json
      - service-account*.json
      - firebase-adminsdk*.json
      - "gcp-*-key*.json"
      # auth / config files
      - .netrc
      - _netrc
      - .npmrc
      - .pypirc
      - .docker/config.json
      - .git-credentials
      - .aws/credentials
      - .aws/config
      - .kube/config
      - kubeconfig
      - "*.kubeconfig"
      # infra state
      - "*.tfstate"
      - "*.tfstate.*"
      - terraform.tfvars
      - "*.auto.tfvars"
      - .vault_pass*
      - vault-token*
      - vault.yml
      - vault.yaml
      - "*-vault.yml"
      - "*-vault.yaml"
      - secrets.dec.yaml
      - secrets.dec.yml
      # data with potential PII
      - "*.sqlite"
      - "*.sqlite3"
      - "*.db"
      - "*.dump"
      - dump.sql
      # compiled artifacts (token waste)
      - "*.pyc"
      - "*.pyo"
      - __pycache__
      - __pycache__/*
      - "*.class"

# Easy Mode — beginner-friendly output with emoji, translated git terms,
# and contextual next-step hints. All fields are optional; omit to keep
# defaults. Override per-invocation with --easy / --no-easy flags or the
# GK_EASY, GK_LANG, GK_EMOJI, GK_HINTS environment variables.
#
# output:
#   # Master switch. true = Easy Mode on for every gk subcommand.
#   easy: false
#
#   # Message catalogue language (BCP-47 short code). "ko" = Korean, "en" = English.
#   lang: ko
#
#   # Prepend emoji to status lines (✅ ❌ 💡 …). Set false for plain text.
#   emoji: true
#
#   # Hint verbosity after each command: "verbose", "minimal", or "off".
#   hints: verbose
